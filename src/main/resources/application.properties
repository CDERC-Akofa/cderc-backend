spring.application.name=cderc-backend
# ==============================
# DATENBANK KONFIGURATION
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/cderc_db
spring.datasource.username=cderc_user
spring.datasource.password=cderc_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Optional: Multi-Tenant Strategy (falls sp‰ter implementiert)
# spring.jpa.properties.hibernate.multiTenancy=DATABASE
# spring.jpa.properties.hibernate.tenant_identifier_resolver=com.cderc.config.TenantResolver
# spring.jpa.properties.hibernate.multi_tenant_connection_provider=com.cderc.config.TenantConnectionProvider

# ==============================
# SERVER PORT
# ==============================
server.port=8080

# ==============================
# JWT CONFIGURATION
# ==============================
jwt.secret=MeinGeheimerJWTKey12345
jwt.expiration=3600000  # 1 Stunde in Millisekunden

# ==============================
# LOGGING
# ==============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================
# OPTIONAL: SPRING SWAGGER / OPENAPI
# ==============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
